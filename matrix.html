<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>navbar test</title>
    <style>
        body {
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-image: url(https://i.pinimg.com/1200x/62/43/17/6243171dfde0aa1a657c06ae50af7172.jpg);
            background-position: center;
            background-repeat: no-repeat;
            background-size: 100%;
            background-attachment: fixed;
        }

        .box {
            border: 1px solid #000000;
            padding: 30px;
            padding-left: 30px;
            padding-right: 30px;
            box-sizing: border-box;
            background: rgb(238, 224, 203, 0.7);
            margin: 30px;
            margin-left: 200px;
            margin-right: 200px;
            margin-top: 150px;
        }

        
        .box .text {
            white-space: normal;        
            overflow-wrap: anywhere;
            hyphens: auto;             
            margin: 10px 0;
            font-size: large;
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Courier New', Courier, monospace;
        }
        
        .box .text2 {
            white-space: normal;        
            overflow-wrap: anywhere;
            hyphens: auto;             
            margin: 10px 0;
            margin-left: 150px;
            margin-right: 200px;
            font-size: large;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
        } 

         .centered-ul {
            list-style-position: inside;
            text-align: center;
            padding: 0;
        }
                    
        .centeredul li {
            margin-left: 0;
        }

        a {
            color: rgb(0, 0, 0);
        }

        a:visited {
            color: rgb(0, 0, 0);
        }

        a:hover {
            color:darkslategray;
        }

        a:active {
            color: rgb(0, 0, 0);
        }

        .fixed-footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: rgb(131, 151, 136, 0.7);
            border-color: rgb(33, 76, 49);
            color:black;
            text-align: center;
            border: black;
            border-width: 1px;
            border-style: solid;
        }

        body {
            margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-sm border border-dark" style="background-color: rgb(131, 151, 136);">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="mynavbar">
                    <img src="ict proj logo.png" alt="Logo" width="45" height="45">
                <ul class="navbar-nav me-auto">
                    <li class="nav-items"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-items"><a href="matrix.html" class="nav-link">Fare Matrix</a></li>
                    <li class="nav-items"><a href="schedule.html" class="nav-link">Schedule</a></li>
                    <li class="nav-items"><a href="help.html" class="nav-link">Help</a></li>
                </ul>
                <form class="d-flex">
                    <button type="button" class="btn btn-primary" style="background-color:#eee0cb; border-color: rgb(0, 0, 0); color: black;"><a href="registration.html">Create Account</a></button>
                </form>
            </div>
        </div>
    </nav>

    <!-- matrix -->
    <div class="box" role="region" aria-label="Text box" style="text-align: center;">
    <h1><i>Jelco Fare Matrix</i></h1>

    <h3>Pick-Up Location</h3>
        <select id="fromStation" style="width: 100%; padding: 10px; margin-bottom: 20px;">
            <option value="">Select Pick-Up Location</option>
            <option value="North Avenue">North Avenue</option>
            <option value="Quezon Avenue">Quezon Avenue</option>
            <option value="Kamuning">Kamuning</option>
            <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
            <option value="Santolan-Annapolis">Santolan-Annapolis</option>
            <option value="Ortigas">Ortigas</option>
            <option value="Shaw Boulevard">Shaw Boulevard</option>
            <option value="Boni">Boni</option>
            <option value="Guadalupe">Guadalupe</option>
            <option value="Ayala">Ayala</option>
            <option value="Magallanes">Magallanes</option>
            <option value="Taft Avenue">Taft Avenue</option>
    </select>

    <h3>Drop-Off Location</h3>
        <select id="toStation" style="width: 100%; padding: 10px; margin-bottom: 20px;">
            <option value="">Select Drop-Off Location</option>
            <option value="North Avenue">North Avenue</option>
            <option value="Quezon Avenue">Quezon Avenue</option>
            <option value="Kamuning">Kamuning</option>
            <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
            <option value="Santolan-Annapolis">Santolan-Annapolis</option>
            <option value="Ortigas">Ortigas</option>
            <option value="Shaw Boulevard">Shaw Boulevard</option>
            <option value="Boni">Boni</option>
            <option value="Guadalupe">Guadalupe</option>
            <option value="Ayala">Ayala</option>
            <option value="Magallanes">Magallanes</option>
            <option value="Taft Avenue">Taft Avenue</option>
    </select>

    <div style="margin-top: 20px;">
        <button onclick="calculateRegularFare()" style="padding: 10px 20px; margin-right: 10px; cursor: pointer;">Regular Fare</button>
        <button onclick="calculateDiscountedFare()" style="padding: 10px 20px; cursor: pointer;">Discounted Fare</button>
        <!-- discounted: 20% -->
        <!-- base fare: 50, plus +25 for each stop -->
    </div>

    <!-- fare price -->
    <div id="fareResult" style="margin-top: 30px; display: none;">
        <h3>Fare Details</h3>
        <p><strong>Route:</strong> <span id="routeInfo"></span></p>
        <p><strong>Number of Stops:</strong> <span id="stopsInfo"></span></p>
        <p><strong>Fare:</strong> <span id="fareAmount" style="font-size: 24px; color: #000000; font-weight: bold;"></span></p>
    </div>
</div>

    <!-- footer -->
    <footer>
    <br>
    <div class="fixed-footer" style="text-align: center;">
        <p style="display: block; margin: 5px 0;">madrelejos, co | 9-topaz © 2026</p>
    </footer>

<script src="proj.js"></script>
</body>
</html>
