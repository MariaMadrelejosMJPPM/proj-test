<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
     body {
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-image: url(https://i.pinimg.com/1200x/62/43/17/6243171dfde0aa1a657c06ae50af7172.jpg);
            background-position: center;
            background-repeat: no-repeat;
            background-size: 100%;
            background-attachment: fixed;
        }

        /* box */
    .box {
      border: 1px solid #000000;
      padding: 30px;
      padding-left: 30px;
      padding-right: 30px;
      box-sizing: border-box;
      background: rgb(238, 224, 203, 0.7);
      margin: 30px;
    }

    
    .box .text {
      white-space: normal;        
      overflow-wrap: anywhere;
      hyphens: auto;             
      margin: 10px 0;
      font-size: large;
      text-align: center;
      margin-bottom: 30px;
      font-family: 'Courier New', Courier, monospace;
    }
     
    .box .text2 {
      white-space: normal;        
      overflow-wrap: anywhere;
      hyphens: auto;             
      margin: 10px 0;
      margin-left: 150px;
      margin-right: 200px;
      font-size: large;
      text-align: left;
      font-family: 'Courier New', Courier, monospace;
    }

    #circle-img {
  width: 150px;  
  height: 150px;  
  border-radius: 50%;
  object-fit: cover; 
}

 .fixed-footer {
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
        background-color: rgb(131, 151, 136, 0.7);
        border-color: rgb(0, 0, 0);
        border-style: solid;
        color:black;
        border-width: 1px;
        text-align: center;
        padding: 10px 0;
    }

        .fixed-footer p {
    margin: 5px 0; 
    display: block;
    text-decoration: none; 
        }
    body {
      margin-bottom: 50px;
    }
    </style>
</head>
<body>
 <!-- navbar -->
    <nav class="navbar navbar-expand-sm border border-dark" style="background-color: rgb(131, 151, 136);">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="mynavbar">
                    <img src="ict proj logo.png" alt="Logo" width="45" height="45">
                <ul class="navbar-nav me-auto">
                    <li class="nav-items"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-items"><a href="matrix.html" class="nav-link">Fare Matrix</a></li>
                    <li class="nav-items"><a href="#" class="nav-link">Schedule</a></li>
                    <li class="nav-items"><a href="#" class="nav-link">Help</a></li>
                </ul>
                <form class="d-flex">
                    <button type="button" class="btn btn-primary" style="background-color: rgb(238, 224, 203); border-color: rgb(33, 76, 49); color:black"><a href="registration.html" style="color:black;">Create Account</a></button>
                </form>
            </div>
        </div>
    </nav>

   <!-- form -->
    <div class="box" role="region" aria-label="Text box">
        <div class="container-fluid">
            <div class="row d-flex align-items-center">
                <!-- file upload -->
                <div class="col-md-6" style="text-align: center;">
                    <form style="margin-left: 200px;">
                        <img id="circle-img" src="https://i.pinimg.com/1200x/83/bc/8b/83bc8b88cf6bc4b4e04d153a418cde62.jpg"><br><br>
                         <input type="file" id="fileInput" placeholder="Choose file" accept="image/*"><br>
                        <button class="btn btn-primary" type="button" onclick="uploadPicture(); console.log('Button clicked');">Upload Picture</button>
                    </form>
                </div>
                <!-- registration -->
                <div class="col-md-6">
                    <h2><i>REGISTRATION</i></h2>
                    <p>Please fill out all the required fields.</p>
                    <form>
                        <input type="text" placeholder="Enter first name"><br><br>
                        <input type="text" placeholder="Enter last name"><br><br>
                        <input type="number" placeholder="Enter age" style="margin-right:10px;"><input type="number" placeholder="Contact number"><br><br>
                        <input type="password" placeholder="Enter password"><br><br>
                        <input type="password" placeholder="Confirm password"><br><br>
                        <input type="checkbox" value="check">I agree to the terms and conditions.<br><br>
                        <button class="btn btn-primary" type="submit"><a href="confirmation.html" style="color:white;">Create My Account</a></button>


                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- footer -->
    <footer>
    <br>
    <div class="fixed-footer" style="text-align: center;">
        <p>madrelejos, co | 9-topaz © 2026</p></footer>
    <script>
        // profile picture
function uploadPicture() {
    const newImageSrc = 'https://static.wikia.nocookie.net/the-snack-encyclopedia/images/7/7d/Apple.png/revision/latest?cb=20200706145821';
    const imgElement = document.getElementById('circle-img');
    
    if (!imgElement) {
        console.error('Image element not found!');
        return;
    }
    
    imgElement.src = newImageSrc;
    window.alert('Your profile picture has been uploaded.');
    window.alert('To register, click OK');
}
    </script>
</body>
</html>
